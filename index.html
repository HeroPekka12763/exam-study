    <div id="doc-overlay"></div>
    <script>
    function showDocOverlay() {
        const overlay = document.getElementById('doc-overlay');
        overlay.style.display = 'block';
        setTimeout(() => {
            document.addEventListener('click', hideDocOverlayOnce, { once: true });
        }, 0);
    }

    function hideDocOverlayOnce() {
        const overlay = document.getElementById('doc-overlay');
        overlay.style.display = 'none';
    }
    </script>
